<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>赛事解说剪辑助手</title>
  <link rel="stylesheet" href="styles/popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="popup-header">
      <h1>赛事解说剪辑助手</h1>
      <span class="version">v1.0.0</span>
    </div>
    
    <div class="popup-nav">
      <button class="nav-btn active" data-panel="quick">快捷操作</button>
      <button class="nav-btn" data-panel="settings">账号设置</button>
      <button class="nav-btn" data-panel="data">数据</button>
    </div>

    <div class="popup-content">
      <div class="panel active" id="panel-quick">
        <div class="action-grid">
          <button class="action-btn" id="btn-open-panel">
            <span class="action-icon">🎬</span>
            <span>打开剪辑面板</span>
          </button>
          <button class="action-btn" id="btn-clear-cache">
            <span class="action-icon">🗑️</span>
            <span>清空缓存</span>
          </button>
          <button class="action-btn" id="btn-drafts">
            <span class="action-icon">📝</span>
            <span>我的草稿</span>
          </button>
          <button class="action-btn" id="btn-feedback">
            <span class="action-icon">📊</span>
            <span>播放反馈</span>
          </button>
        </div>
        <div class="quick-tips">
          <h3>使用提示</h3>
          <ul>
            <li>打开视频页面后，点击浮动按钮开启剪辑模式</li>
            <li>按快捷键 <kbd>Q</kbd> 标记精彩时刻</li>
            <li>按快捷键 <kbd>W</kbd> 开始/暂停录制解说</li>
          </ul>
        </div>
      </div>

      <div class="panel" id="panel-settings">
        <div class="settings-section">
          <h3>平台账号绑定</h3>
          <div class="account-list" id="account-list">
            <div class="account-item">
              <span class="platform-icon">📺</span>
              <span class="platform-name">抖音</span>
              <button class="bind-btn" data-platform="douyin">绑定</button>
            </div>
            <div class="account-item">
              <span class="platform-icon">🎥</span>
              <span class="platform-name">快手</span>
              <button class="bind-btn" data-platform="kuaishou">绑定</button>
            </div>
            <div class="account-item">
              <span class="platform-icon">📱</span>
              <span class="platform-name">B站</span>
              <button class="bind-btn" data-platform="bilibili">绑定</button>
            </div>
            <div class="account-item">
              <span class="platform-icon">🎬</span>
              <span class="platform-name">视频号</span>
              <button class="bind-btn" data-platform="wechat">绑定</button>
            </div>
          </div>
        </div>
        <div class="settings-section">
          <h3>默认发布设置</h3>
          <div class="form-group">
            <label>默认可见范围</label>
            <select id="default-visibility">
              <option value="public">公开</option>
              <option value="private">仅自己可见</option>
              <option value="friends">好友可见</option>
            </select>
          </div>
          <div class="form-group">
            <label>自动扩展片段 (秒)</label>
            <input type="number" id="default-extend" value="3" min="1" max="15">
          </div>
          <div class="form-group">
            <label>慢动作倍率</label>
            <select id="default-slowmo">
              <option value="0.25">0.25x</option>
              <option value="0.5" selected>0.5x</option>
              <option value="0.75">0.75x</option>
            </select>
          </div>
          <button class="save-settings-btn">保存设置</button>
        </div>
      </div>

      <div class="panel" id="panel-data">
        <div class="stats-section">
          <h3>剪辑数据统计</h3>
          <div class="stats-grid">
            <div class="stat-card">
              <span class="stat-value" id="stat-clips">0</span>
              <span class="stat-label">已剪辑片段</span>
            </div>
            <div class="stat-card">
              <span class="stat-value" id="stat-published">0</span>
              <span class="stat-label">已发布</span>
            </div>
            <div class="stat-card">
              <span class="stat-value" id="stat-views">0</span>
              <span class="stat-label">总播放量</span>
            </div>
            <div class="stat-card">
              <span class="stat-value" id="stat-drafts">0</span>
              <span class="stat-label">草稿数</span>
            </div>
          </div>
        </div>
        <div class="stats-section">
          <h3>最近播放反馈</h3>
          <div class="feedback-list" id="feedback-list">
            <p class="empty-text">暂无播放数据</p>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
